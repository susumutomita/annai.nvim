name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (stable)
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Show Neovim version
        run: nvim --version | head -1

      # 履歴・統計ロジックを UI 非依存で検証する（nvim -l でスクリプト実行）。
      - name: Run tests
        run: nvim --headless -l tests/run.lua
